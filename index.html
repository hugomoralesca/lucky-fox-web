<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Fox GDL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0d0d0d;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVBAR FIXED */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #333;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 115px; /* Tamaño del logo aumentado un 60% por segunda vez */
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 400;
        }

        /* Botón WA en el Navbar */
        .btn-navbar-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            margin-left: 20px;
        }

        /* SECCIÓN HERO CON IMAGEN DE FONDO */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 100px; /* Espacio para el navbar fixed */
            
            /* CONFIGURACIÓN DE IMAGEN DE FONDO CON degradado negro */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Efecto elegante al hacer scroll */
        }

        h1 {
            font-size: clamp(32px, 8vw, 60px);
            color: #ff6600; /* Naranja Lucky */
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 22px);
            color: #fff;
            margin-bottom: 30px;
        }

        /* BOTÓN WA PRINCIPAL */
        .btn-whatsapp-hero {
            background-color: #25d366;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }

        /* SECCIÓN GALERÍA */
        .gallery {
            padding: 80px 5%;
            background-color: #000;
            text-align: center;
        }

        .gallery h2 {
            font-weight: 300;
            margin-bottom: 40px;
            font-size: 24px;
            color: #ccc;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-container img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #222;
        }

        /* SECCIÓN UBICACIÓN CON EL MAPA CORREGIDO */
        .ubicacion-section {
            padding: 80px 5%;
            background-color: #0d0d0d;
            text-align: center;
            border-top: 1px solid #222;
        }

        .ubicacion-section h2 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .address-text {
            color: #888;
            margin-bottom: 40px;
        }

        /* Contenedor del mapa IDÉNTICO a tu captura */
        .map-container {
            overflow: hidden;
            border-radius: 30px; /* Redondeado 3xl */
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); /* Sombra 2xl */
            max-width: 1000px;
            margin: 0 auto;
            border: 2px solid #222;
            height: 450px; /* Altura fija para el mapa */
        }

        /* FOOTER & SOCIAL */
        .footer-section {
            padding: 40px 5%;
            text-align: center;
            background-color: #000;
            border-top: 1px solid #222;
        }

        .social-icons a {
            margin: 0 15px;
            display: inline-block;
        }

        .social-icons img {
            width: 28px;
            filter: invert(1); /* Iconos blancos */
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .logo-container img { height: 80px; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="lucky-logo.png" alt="Lucky Fox Logo">
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="#galeria">El Lugar</a>
                <a href="#ubicacion">Ubicación</a>
                <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank">FB</a>
                <a href="https://www.instagram.com/luckyfox_gdl" target="_blank">IG</a>
            </div>
            <a href="https://wa.me/523329197976" class="btn-navbar-whatsapp">Reservar</a>
        </div>
    </nav>

    <div class="hero">
        <h1>LUCKY FOX GDL</h1>
        <p>Restaurante & Bar | Zapopan, Jal.</p>
        <a href="https://wa.me/523329197976" class="btn-whatsapp-hero">RESERVAR POR WHATSAPP</a>
    </div>

    <div id="galeria" class="gallery">
        <h2>Disfruta, come y bebe, que la vida es breve</h2>
        <div class="gallery-container">
            <img src="IMG_2786.jpg" alt="Lucky Fox 1">
            <img src="IMG_2787.jpg" alt="Lucky Fox 2">
            <img src="IMG_2788.jpg" alt="Lucky Fox 3">
            <img src="IMG_2791.jpg" alt="Lucky Fox 4">
        </div>
    </div>

    <div id="ubicacion" class="ubicacion-section">
        <h2>¿Dónde estamos?</h2>
        <p class="address-text">Av. Aviación 4572-1A, Jardín Real, Zapopan, Jal.</p>
        <div class="map-container">
            <iframe src="http://googleusercontent.com/http://googleusercontent.com/maps.google.com/9" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <div class="footer-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
            </a>
            <a href="https://www.instagram.com/luckyfox_gdl" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            </a>
        </div>
        <p style="color: #444; font-size: 12px; margin-top: 20px;">© 2026 Lucky Fox GDL | Hugo Morales</p>
    </div>

</body>
</html>
