<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Fox GDL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0d0d0d;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR FIXED */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background-color: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #333;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 45px;
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .btn-navbar-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            margin-left: 20px;
        }

        /* HERO SECTION */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 60px;
            /* IMAGEN HERO CONFIGURADA */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Efecto elegante al hacer scroll */
        }

        h1 {
            font-size: clamp(32px, 8vw, 60px);
            color: #ff6600;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 22px);
            color: #fff;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn-whatsapp-hero {
            background-color: #25d366;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        /* GALERÍA DE IMÁGENES */
        .gallery {
            padding: 80px 5%;
            background-color: #000;
            text-align: center;
        }

        .gallery h2 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-container img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #222;
            transition: 0.4s;
        }

        .gallery-container img:hover {
            border-color: #ff6600;
            transform: translateY(-5px);
        }

        /* FOOTER & SOCIAL */
        .info-section {
            padding: 60px 5%;
            text-align: center;
            background-color: #0d0d0d;
            border-top: 1px solid #222;
        }

        .social-icons a {
            margin: 0 15px;
            display: inline-block;
        }

        .social-icons img {
            width: 28px;
            filter: invert(1);
        }

        .location {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        footer {
            padding: 20px;
            font-size: 12px;
            color: #444;
            text-align: center;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="lucky-logo.png" alt="Lucky Fox Logo">
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/luckyfox_gdl" target="_blank">Instagram</a>
            </div>
            <a href="https://wa.me/523329197976" class="btn-navbar-whatsapp">Reservar</a>
        </div>
    </nav>

    <div class="hero">
        <h1>LUCKY FOX GDL</h1>
        <p>Restaurante & Bar | Zapopan, Jal.</p>
        <a href="https://wa.me/523329197976" class="btn-whatsapp-hero">RESERVAR POR WHATSAPP</a>
    </div>

    <div class="gallery">
        <h2>EL LUGAR</h2>
        <div class="gallery-container">
            <img src="IMG_2786.jpg" alt="Lucky Fox 1">
            <img src="IMG_2787.jpg" alt="Lucky Fox 2">
            <img src="IMG_2788.jpg" alt="Lucky Fox 3">
            <img src="IMG_2791.jpg" alt="Lucky Fox 4">
        </div>
    </div>

    <div class="info-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
            </a>
            <a href="https://www.instagram.com/luckyfox_gdl" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            </a>
        </div>

        <div class="location">
            <p>Av. Aviación 4572-1A, Jardín Real, Zapopan, Jal.</p>
            <a href="https://maps.app.goo.gl/uXvVbXFwM6Zk5T9k9" target="_blank" style="color: #ff6600; text-decoration: none; font-weight: bold;">VER MAPA</a>
        </div>
    </div>

    <footer>
        <p>© 2026 Lucky Fox GDL | Hugo Morales</p>
    </footer>

</body>
</html>
