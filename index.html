<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Fox GDL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0d0d0d;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVBAR - Altura reducida al 25% */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 5%;
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #333;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 85px;
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Iconos sociales en Navbar */
        .nav-social img {
            width: 24px;
            filter: invert(1);
            transition: 0.3s;
        }

        .nav-social:hover img {
            opacity: 0.7;
        }

        .btn-navbar-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
        }

        /* HERO SECTION */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('hero.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            font-size: clamp(32px, 8vw, 60px);
            color: #ff6600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 22px);
            margin-bottom: 30px;
        }

        .btn-whatsapp-hero {
            background-color: #25d366;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }

        /* GALERÍA */
        .gallery {
            padding: 80px 5%;
            background-color: #000;
            text-align: center;
        }

        .gallery h2 {
            font-weight: 300;
            margin-bottom: 40px;
            font-size: 24px;
            color: #ccc;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-container img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #222;
        }

        /* UBICACIÓN */
        .ubicacion-section {
            padding: 80px 5%;
            background-color: #0d0d0d;
            text-align: center;
            border-top: 1px solid #222;
        }

        .map-container {
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 1000px;
            margin: 40px auto 0;
            border: 2px solid #222;
            height: 450px;
            background-color: #1a1a1a;
        }

        /* FOOTER */
        .footer-section {
            padding: 40px 5%;
            text-align: center;
            background-color: #000;
        }

        .social-icons img {
            width: 28px;
            filter: invert(1);
            margin: 0 15px;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            .navbar { padding: 8px 5%; }
            .logo-container img { height: 60px; }
            
            .hero {
                height: 70vh;
                background-attachment: scroll;
                background-position: center center;
                margin-top: 70px;
            }

            .map-container { height: 300px; }
            .nav-social img { width: 20px; }
            .btn-navbar-whatsapp { padding: 6px 15px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="lucky-logo.png" alt="Lucky Fox Logo">
        </div>
        <div class="nav-right">
            <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank" class="nav-social">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB">
            </a>
            <a href="https://www.instagram.com/luckyfox_gdl" target="_blank" class="nav-social">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="IG">
            </a>
            <a href="https://wa.me/523329197976" class="btn-navbar-whatsapp">Reservar</a>
        </div>
    </nav>

    <div class="hero">
        <h1>LUCKY FOX GDL</h1>
        <p>Restaurante & Bar | Zapopan, Jal.</p>
        <a href="https://wa.me/523329197976" class="btn-whatsapp-hero">RESERVAR POR WHATSAPP</a>
    </div>

    <div class="gallery">
        <h2>Disfruta, come y bebe, que la vida es breve</h2>
        <div class="gallery-container">
            <img src="IMG_2786.jpg" alt="Lucky Fox 1">
            <img src="IMG_2787.jpg" alt="Lucky Fox 2">
            <img src="IMG_2788.jpg" alt="Lucky Fox 3">
            <img src="IMG_2791.jpg" alt="Lucky Fox 4">
        </div>
    </div>

    <div class="ubicacion-section">
        <h2>¿Dónde estamos?</h2>
        <p style="color: #888;">Av. Aviación 4572-1A, Jardín Real, 45136 Zapopan, Jal.</p>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3732.128362615462!2d-103.45332802388062!3d20.740286480838965!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8428afbe926f8b5d%3A0x291d986e69fffd70!2sLucky%20Fox!5e0!3m2!1ses-419!2smx!4v1712950000000!5m2!1ses-419!2smx" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <div class="footer-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/luckyfoxgdl/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB"></a>
            <a href="https://www.instagram.com/luckyfox_gdl" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="IG"></a>
        </div>
        <p style="color: #444; font-size: 12px; margin-top: 20px;">© 2026 Lucky Fox GDL</p>
    </div>

</body>
</html>
